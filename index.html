<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فارسی — Learn Persian</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0b07;
  --bg2:#181410;
  --bg3:#221e18;
  --card:#2a2520;
  --border:#3d372e;
  --accent:#c8703a;
  --accent2:#e8a86a;
  --gold:#d4a843;
  --blue:#5b9bd5;
  --green:#6baa7a;
  --purple:#9b7fc8;
  --text:#f0ebe3;
  --text2:#a89880;
  --text3:#6b5e4e;
  --red:#d05555;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;width:260px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sidebar-header{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid var(--border)}
.logo-fa{font-family:'Playfair Display',serif;font-size:32px;color:var(--accent);letter-spacing:6px;display:block;text-align:center}
.logo-en{font-size:11px;color:var(--text3);text-align:center;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.sidebar-search{padding:.75rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif}
.sidebar-search input:focus{outline:none;border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text3)}
.section-group{padding:.5rem 0}
.section-group-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:.5rem 1.25rem;font-weight:500}
.lesson-link{display:flex;align-items:center;gap:10px;padding:.5rem 1.25rem;cursor:pointer;transition:all .2s;font-size:13px;color:var(--text2);border-left:2px solid transparent}
.lesson-link:hover{color:var(--text);background:var(--bg3);border-left-color:var(--border)}
.lesson-link.active{color:var(--accent2);background:var(--bg3);border-left-color:var(--accent)}
.lesson-link .tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;margin-left:auto;flex-shrink:0}
.tag-alpha{background:#2d1e0e;color:var(--accent)}
.tag-conv{background:#0e1e2d;color:var(--blue)}
.tag-cult{background:#1a1d0e;color:var(--green)}
.tag-hist{background:#1d0e2d;color:var(--purple)}
.lesson-link .num{width:20px;height:20px;border-radius:4px;background:var(--bg3);font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0}
.lesson-link.active .num{background:var(--accent);color:#fff}

/* MAIN */
.main{margin-left:260px;min-height:100vh}
.topbar{position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 2rem;display:flex;align-items:center;gap:1rem;z-index:50}
.topbar-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text)}
.topbar-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.content{padding:2rem;max-width:800px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:2rem}
.tab{padding:.6rem 1.25rem;font-size:13px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}

.section{display:none}
.section.active{display:block}

/* CARDS */
.intro-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:2rem;border-left:3px solid var(--accent)}
.intro-card h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:.5rem;color:var(--accent2)}
.intro-card p{font-size:14px;color:var(--text2);line-height:1.7}

/* CHAR GRID */
.char-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:2rem}
.char-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center;transition:border-color .2s}
.char-card:hover{border-color:var(--accent)}
.c-main{font-size:46px;line-height:1.2;margin-bottom:4px}
.c-name{font-size:11px;font-weight:500;margin-bottom:2px}
.c-roman{font-size:10px;color:var(--text3)}
.c-nc{font-size:9px;color:var(--accent);margin-top:3px}
.c-desc{font-size:10px;color:var(--text3);margin-top:6px;line-height:1.4}

/* FORMS TABLE */
.forms-wrap{overflow-x:auto;margin-bottom:2rem}
table.forms{width:100%;border-collapse:collapse;font-size:13px}
table.forms th{text-align:left;padding:8px 12px;color:var(--text3);font-size:11px;font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
table.forms td{padding:10px 12px;border-bottom:1px solid var(--border)}
table.forms td:first-child{color:var(--text2);font-size:12px}
.f-form{font-size:24px;line-height:1}
.nc-badge{font-size:9px;background:#2d1e0e;color:var(--accent);padding:2px 5px;border-radius:3px;display:inline-block}
.tip-row td{background:#1a1200;color:var(--gold);font-size:11px;padding:4px 12px 8px}

/* VOWELS BOX */
.vowel-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:1rem 1.25rem;margin-bottom:2rem;font-size:13px;color:var(--text2);line-height:1.7}
.vowel-box strong{color:var(--gold)}

/* VOCAB */
.vocab-list{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem}
.vocab-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.v-farsi{font-size:22px;min-width:90px;text-align:right;direction:rtl;color:var(--accent2)}
.v-roman{font-size:13px;color:var(--blue);font-weight:500}
.v-meaning{font-size:13px;color:var(--text2)}

/* SENTENCES */
.sent-list{display:flex;flex-direction:column;gap:10px;margin-bottom:2rem}
.sent-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.s-fa{font-size:20px;direction:rtl;text-align:right;color:var(--text);margin-bottom:4px}
.s-ro{font-size:13px;color:var(--blue);margin-bottom:2px}
.s-en{font-size:13px;color:var(--text3)}

/* DIALOGUE */
.dialogue{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:2rem}
.dialogue h3{font-size:14px;color:var(--text3);margin-bottom:1rem;font-weight:400}
.dlg-line{display:flex;gap:12px;margin-bottom:1rem;align-items:flex-start}
.dlg-line.right{flex-direction:row-reverse}
.dlg-name{font-size:11px;font-weight:500;white-space:nowrap;margin-top:4px;min-width:50px}
.dlg-name.a{color:var(--accent)}
.dlg-name.b{color:var(--blue);text-align:right}
.dlg-bubble{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;max-width:440px}
.dlg-line.right .dlg-bubble{background:#1a1e2a;border-color:#2a3040}
.dlg-fa{font-size:17px;direction:rtl;text-align:right;color:var(--text);margin-bottom:3px}
.dlg-ro{font-size:12px;color:var(--blue);margin-bottom:2px;font-style:italic}
.dlg-en{font-size:12px;color:var(--text3)}

/* CULTURE */
.culture-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
.culture-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--card)}
.culture-header .icon{font-size:18px}
.culture-header h3{font-size:15px;font-weight:500}
.culture-body{padding:1.25rem}
.cult-fa{font-size:22px;direction:rtl;text-align:right;color:var(--gold);margin-bottom:5px;line-height:1.5}
.cult-ro{font-size:13px;color:var(--text3);font-style:italic;margin-bottom:5px}
.cult-en{font-size:14px;font-weight:500;margin-bottom:10px;color:var(--text2)}
.cult-body{font-size:13px;color:var(--text2);line-height:1.7}

/* CITY CARDS */
.city-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:2rem}
.city-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.25rem}
.city-card h3{font-size:15px;font-weight:500;margin-bottom:3px;color:var(--accent2)}
.city-card .city-fa{font-size:20px;direction:rtl;color:var(--gold);margin-bottom:8px}
.city-card p{font-size:12px;color:var(--text2);line-height:1.6}
.city-card .sights{margin-top:8px;font-size:11px;color:var(--text3)}

/* INFO BOXES */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem}
.info-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:1rem}
.info-box h4{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.info-box p{font-size:13px;color:var(--text2);line-height:1.6}

/* TIMELINE */
.timeline{position:relative;padding-left:24px;margin-bottom:2rem}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:1.5rem}
.tl-item::before{content:'';position:absolute;left:-20px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg3)}
.tl-year{font-size:11px;font-weight:500;color:var(--accent);margin-bottom:3px}
.tl-title{font-size:14px;font-weight:500;margin-bottom:3px}
.tl-body{font-size:13px;color:var(--text2);line-height:1.6}
.tl-fa{font-size:16px;direction:rtl;color:var(--gold);margin-top:4px}

/* QUIZ */
.quiz-progress{display:flex;gap:5px;margin-bottom:1.5rem}
.qp-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .3s}
.qp-dot.done{background:var(--green)}
.qp-dot.cur{background:var(--accent)}

.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.q-label{font-size:12px;color:var(--text3);margin-bottom:.75rem}
.q-text{font-size:15px;font-weight:500;margin-bottom:.75rem;color:var(--text)}
.q-char{font-size:56px;text-align:center;padding:1rem 0;line-height:1;color:var(--accent2)}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem}
.q-opt{padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;color:var(--text2);text-align:center;transition:all .2s;font-family:'DM Sans',sans-serif}
.q-opt:hover{border-color:var(--accent);color:var(--text)}
.q-opt.ok{background:#0e2010;border-color:var(--green);color:var(--green)}
.q-opt.no{background:#2d0e0e;border-color:var(--red);color:var(--red)}
.q-feedback{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:.75rem;display:none}
.q-feedback.show{display:block}
.q-feedback.ok{background:#0e2010;color:var(--green)}
.q-feedback.no{background:#2d0e0e;color:var(--red)}
.q-next{margin-top:1rem;text-align:right}

.btn{padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;border:none}
.btn-acc{background:var(--accent);color:#fff}
.btn-acc:hover{background:#a85c2a}
.btn-sec{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-sec:hover{border-color:var(--accent);color:var(--accent)}

.score-board{text-align:center;padding:3rem 1rem}
.sc-big{font-size:56px;font-weight:300;color:var(--accent);font-family:'Playfair Display',serif}
.sc-label{font-size:14px;color:var(--text3);margin-bottom:1rem}
.sc-msg{font-size:14px;color:var(--text2);line-height:1.7;max-width:400px;margin:0 auto 2rem}

.label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);font-weight:500;margin-bottom:.75rem}

/* WEATHER */
.weather-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2rem}
.wth-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem;text-align:center}
.wth-card .season{font-size:11px;color:var(--text3);margin-bottom:4px}
.wth-card .temp{font-size:18px;font-weight:500;color:var(--accent2)}
.wth-card .desc{font-size:11px;color:var(--text2);margin-top:3px}
.wth-card .icon{font-size:20px;margin-bottom:4px}

/* PHRASE TABLE */
.phrase-list{display:flex;flex-direction:column;gap:6px;margin-bottom:2rem}
.phrase-item{display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:10px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;align-items:center;font-size:13px}
.phrase-fa{direction:rtl;text-align:right;font-size:17px;color:var(--accent2)}
.phrase-ro{color:var(--blue)}
.phrase-en{color:var(--text3)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* MOBILE */
@media(max-width:700px){
  .sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border)}
  .main{margin-left:0}
  .char-grid{grid-template-columns:repeat(3,1fr)}
  .city-grid,.info-grid,.weather-grid{grid-template-columns:1fr}
  .q-opts{grid-template-columns:1fr}
  .phrase-item{grid-template-columns:1fr 1fr}
  .phrase-en{display:none}
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="logo-fa">فارسی</span>
    <div class="logo-en">Learn Persian</div>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="Search lessons..." oninput="filterLessons(this.value)">
  </div>
  <div id="sidebarContent"></div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">فارسی</div>
    <div class="topbar-badge" id="topbarBadge"></div>
  </div>
  <div class="content">
    <div class="tabs">
      <div class="tab active" data-tab="learn" onclick="switchTab('learn')">Learn</div>
      <div class="tab" data-tab="vocab" onclick="switchTab('vocab')">Vocabulary</div>
      <div class="tab" data-tab="culture" onclick="switchTab('culture')">Culture</div>
      <div class="tab" data-tab="quiz" onclick="switchTab('quiz')">Quiz</div>
    </div>
    <div class="section active" id="sec-learn"></div>
    <div class="section" id="sec-vocab"></div>
    <div class="section" id="sec-culture"></div>
    <div class="section" id="sec-quiz"></div>
  </div>
</div>

<script>
const COLORS=['#c8703a','#5b9bd5','#6baa7a','#9b7fc8','#d4a843'];

const LESSONS = [

// ==================== ALPHABET ====================
{id:'a1',type:'alpha',num:'A1',title:'Alef · Be · Pe · Te · Se',fa:'ا ب پ ت ث',
intro:'Welcome to Persian! We start with the first five letters. Persian reads right to left, and most letters connect to each other like cursive.',
chars:[
  {l:'ا',n:'Alef',r:'ā / a',d:'Like "a" in father. Alef is a vowel carrier and does NOT connect to the next letter.',nc:true},
  {l:'ب',n:'Be',r:'b',d:'Like "b" in book. One dot below the baseline.'},
  {l:'پ',n:'Pe',r:'p',d:'Like "p" in pen. Three dots below — Persian\'s own letter, not in Arabic!'},
  {l:'ت',n:'Te',r:'t',d:'Like "t" in ten. Two dots above.'},
  {l:'ث',n:'Se',r:'s',d:'Like "s" in sun. Three dots above. Rare in modern Farsi words.'},
],
forms:[
  {c:'ا',n:'Alef',s:'ا',i:'اَ',m:'ـا',f:'ـا',nc:true,tip:'Alef NEVER connects to the letter on its left.'},
  {c:'ب',n:'Be',s:'ب',i:'بـ',m:'ـبـ',f:'ـب'},
  {c:'پ',n:'Pe',s:'پ',i:'پـ',m:'ـپـ',f:'ـپ'},
  {c:'ت',n:'Te',s:'ت',i:'تـ',m:'ـتـ',f:'ـت'},
  {c:'ث',n:'Se',s:'ث',i:'ثـ',m:'ـثـ',f:'ـث'},
],
vocab:[
  {fa:'آب',ro:'āb',en:'water'},{fa:'بابا',ro:'bābā',en:'dad/father'},{fa:'تاب',ro:'tāb',en:'swing/light'},
  {fa:'پِدَر',ro:'pedar',en:'father (formal)'},{fa:'باب',ro:'bāb',en:'door/chapter'},
],
sentences:[
  {fa:'بابا آب داد.',ro:'Bābā āb dād.',en:'Dad gave water. (The classic Persian primer sentence!)'},
  {fa:'آب تاب دارد.',ro:'Āb tāb dārad.',en:'The water shines.'},
],
culture:{icon:'📜',tag:'Primer',title:'The Sentence Every Iranian Child Reads First',
fa:'بابا آب داد.',ro:'Bābā āb dād.',en:'"Dad gave water."',
body:'For over a century, this three-word sentence has opened every Persian literacy primer. Simple letters, deep tenderness. Water (آب) holds sacred status in Persian culture — it means generosity, life, purity. Rivers, fountains, and reflecting pools run through Persian gardens, poetry, and architecture.'},
quiz:[
  {q:'Name this letter:',c:'ب',opts:['Alef','Be','Pe','Te'],a:1},
  {q:'Which letter does NOT connect leftward?',c:'',opts:['ب Be','پ Pe','ا Alef','ت Te'],a:2},
  {q:'آب means:',c:'آب',opts:['Fire','Water','Earth','Wind'],a:1},
  {q:'Pe (پ) has how many dots?',c:'پ',opts:['One below','Two above','Three below','None'],a:2},
  {q:'پِدَر means:',c:'پِدَر',opts:['Mother','Brother','Father','Child'],a:2},
]},

{id:'a2',type:'alpha',num:'A2',title:'Jim · Che · He · Khe · Dal',fa:'ج چ ح خ د',
intro:'Five more letters. Notice how ج چ ح خ all share the same body — only their dots differ! And Dal is another non-connector.',
chars:[
  {l:'ج',n:'Jim',r:'j',d:'Like "j" in jar. Dot below the curve.'},
  {l:'چ',n:'Che',r:'ch',d:'Like "ch" in chair. Three dots below. Persian\'s own!'},
  {l:'ح',n:'He (Jimi)',r:'h',d:'Breathy "h". Same shape as Jim/Che but NO dots.'},
  {l:'خ',n:'Khe',r:'kh',d:'Guttural like Scottish "loch". One dot above.'},
  {l:'د',n:'Dal',r:'d',d:'Like "d" in door. Does NOT connect to next letter.',nc:true},
],
forms:[
  {c:'ج',n:'Jim',s:'ج',i:'جـ',m:'ـجـ',f:'ـج'},
  {c:'چ',n:'Che',s:'چ',i:'چـ',m:'ـچـ',f:'ـچ'},
  {c:'ح',n:'He',s:'ح',i:'حـ',m:'ـحـ',f:'ـح'},
  {c:'خ',n:'Khe',s:'خ',i:'خـ',m:'ـخـ',f:'ـخ'},
  {c:'د',n:'Dal',s:'د',i:'دـ',m:'ـد',f:'ـد',nc:true,tip:'Dal does NOT connect to the next letter.'},
],
vocab:[
  {fa:'جان',ro:'jān',en:'soul / dear one'},{fa:'چای',ro:'chāy',en:'tea'},{fa:'دَر',ro:'dar',en:'door / in'},
  {fa:'خانه',ro:'khāne',en:'house / home'},{fa:'باد',ro:'bād',en:'wind'},
],
sentences:[
  {fa:'چای داری؟',ro:'Chāy dāri?',en:'Do you have (any) tea?'},
  {fa:'خانه‌ام جادار است.',ro:'Khāne-am jādār ast.',en:'My house is spacious.'},
],
culture:{icon:'🍵',tag:'Culture',title:'چای — Tea & Persian Hospitality',
fa:'چای نخوردی؟',ro:'Chāy nakhordī?',en:'"Haven\'t you had tea yet?"',
body:'Offering tea (چای) is the first act of Persian hospitality. A host who hasn\'t offered tea has not truly welcomed you. Persian tea is brewed strong in a small glass (استکان estekān), often taken with rock sugar (نبات nabāt) held between the teeth while sipping. Refusing tea can feel like refusing friendship itself.'},
quiz:[
  {q:'چ sounds like:',c:'چ',opts:['"j" in jar','"ch" in chair','"kh" in loch','"h" breathy'],a:1},
  {q:'Which does NOT connect leftward?',c:'',opts:['ج Jim','چ Che','ح He','د Dal'],a:3},
  {q:'خانه means:',c:'خانه',opts:['Tea','Door','Home','Soul'],a:2},
  {q:'چای means:',c:'چای',opts:['Coffee','Water','Tea','Milk'],a:2},
  {q:'Khe (خ) sounds like:',c:'خ',opts:['"k" in key','"ch" in chair','Scottish "ch" in loch','"h" in hat'],a:2},
]},

{id:'a3',type:'alpha',num:'A3',title:'Zal · Re · Ze · Zhe · Sin',fa:'ذ ر ز ژ س',
intro:'Four non-connectors in one lesson! The Re family all sit below the line and sweep right. Sin has three distinctive "teeth" on top.',
chars:[
  {l:'ذ',n:'Zal',r:'z',d:'Like "z" in zone. Does NOT connect left.',nc:true},

culture:{icon:'🌺',tag:'Symbol',title:'گل — The Rose in Persian Culture',
fa:'گل بی‌خار نمی‌شود.',ro:'Gol bi-khār nemishavad.',en:'"A rose does not grow without thorns."',
body:'The rose (گل) and the nightingale (بلبل bulbul) are the two great symbols of Persian poetry. The rose represents beauty, the beloved, and divine love. The nightingale weeps for the rose — representing the lover longing for the unattainable beloved. This pairing appears in Hafez, Rumi, and hundreds of classical poets. When you give flowers in Iran, odd numbers only — even numbers are for funerals.'},

culture:{icon:'🤝',tag:'Etiquette',title:'Ta\'arof — The Art of Persian Politeness',
fa:'بفرمایید!',ro:'Befarmayyid!',en:'"Please, go ahead / help yourself!"',
body:'Ta\'arof (تعارف) is a cornerstone of Iranian social life — a ritual politeness where people offer more than they intend and refuse more than they want. If you admire something in someone\'s home, they will likely offer it to you ("it\'s yours" — مال شماست). You must refuse politely at least twice before accepting. When entering a door, both people will insist the other goes first — "بفرمایید!" (after you!). Understanding ta\'arof helps you navigate Iranian hospitality gracefully.'},

culture:{icon:'📅',tag:'Calendar',title:'The Persian Solar Calendar — شمسی',

  {who:'B',name:'مهمان Guest',fa:'کوبیده، ممنون. و آیا سوپ دارید؟',ro:'Kubide, mamnun. Va āyā sup dārid?',en:'Ground meat, thank you. And do you have soup?'},
  {who:'A',name:'گارسون Waiter',fa:'بله، آش رشته داریم.',ro:'Bale, āsh-e reshte dārim.',en:'Yes, we have noodle soup.'},
  {who:'B',name:'مهمان Guest',fa:'عالیه! حتماً امتحان می‌کنم.',ro:'\'Āliye! Hatman emtahān mikonam.',en:'Wonderful! I\'ll definitely try it.'},
]},
culture:{icon:'🍽️',tag:'Food',title:'Persian Cuisine — A Living Poetry',
fa:'نوش جان!',ro:'Nushe jān!',en:'"May it nourish your soul!" (Bon appétit)',
body:'Persian food is built on aromatic herbs, dried fruits, nuts, and saffron (زعفران za\'farān) — the world\'s most expensive spice, grown in Khorasan. Every Iranian household has its own recipe for ghorme sabzi (herb stew), considered the most loved dish. Bread (نان nān) comes in many forms: lavash (thin flatbread), sangak (baked on river stones), barbari (thick oblong loaf). Tea after meals is non-negotiable.'},
quiz:[
  {q:'نوش جان means:',c:'',opts:['Welcome','Goodbye','Bon appétit','Good night'],a:2},
  {q:'چلو کباب is:',c:'',opts:['A soup','Rice with grilled meat','A dessert','A drink'],a:1},
  {q:'حساب لطفاً means:',c:'',opts:['The menu please','One more please','The bill please','Thank you'],a:2},
  {q:'What is دوغ?',c:'دوغ',opts:['Sweet tea','Yogurt drink','Fruit juice','Sparkling water'],a:1},
  {q:'خیلی خوشمزه means:',c:'',opts:['Very expensive','Very spicy','Very delicious','Very small'],a:2},
]},

{id:'c4',type:'conv',num:'C4',title:'Shopping & Bargaining',fa:'خرید و چانه‌زنی',
intro:'A2 level. Persian markets (bazaars) are legendary. Learn to ask prices, bargain politely, and shop. The Grand Bazaar of Tehran is one of the largest covered markets on Earth.',
phrases:[
  {fa:'این چند تومنه؟',ro:'In chand tumāne?',en:'How much is this? (in Tomans)'},
  {fa:'گرونه! تخفیف میدید؟',ro:'Girone! Takhfif midid?',en:'It\'s expensive! Can you give a discount?'},
  {fa:'این رو می‌خوام.',ro:'Ino mikhām.',en:'I want this one.'},
  {fa:'یه کم ارزون‌تر نمیشه؟',ro:'Ye kam arzuntar nemishe?',en:'Can\'t it be a little cheaper?'},
  {fa:'باشه، می‌خرم.',ro:'Bāshe, mikharam.',en:'OK, I\'ll buy it.'},
  {fa:'کجا می‌تونم ... پیدا کنم؟',ro:'Kojā mitoonam ... peydā konam?',en:'Where can I find ...?'},
  {fa:'فقط نگاه می‌کنم.',ro:'Faqat negāh mikonam.',en:'I\'m just looking.'},
],
dialogue:{title:'In the bazaar, buying a carpet',
lines:[
  {who:'A',name:'مشتری Customer',fa:'سلام. این فرش چند تومنه؟',ro:'Salām. In farsh chand tumāne?',en:'Hello. How much is this carpet?'},
  {who:'B',name:'فروشنده Seller',fa:'سلام! این دست‌بافته. سه میلیونه.',ro:'Salām! In dast-bāfte. Se milyone.',en:'Hello! This is handwoven. It\'s three million (Tomans).'},
  {who:'A',name:'مشتری Customer',fa:'گرونه! دو میلیون چطوره؟',ro:'Girone! Do milyon chetore?',en:'That\'s expensive! How about two million?'},
  {who:'B',name:'فروشنده Seller',fa:'نمیشه آقا. دو و نیم، آخرین قیمته.',ro:'Nemishe āghā. Do-o-nim, ākharin ghimate.',en:'Can\'t do it, sir. Two and a half — final price.'},
  {who:'A',name:'مشتری Customer',fa:'باشه. قبوله. بسته‌بندی می‌کنید؟',ro:'Bāshe. Qabule. Baste-bandi mikonid?',en:'OK. Deal. Can you pack it?'},
]},
culture:{icon:'🏺',tag:'Bazaar',title:'The Persian Bazaar — بازار',
fa:'بازار',ro:'Bāzār',en:'"Market / Bazaar"',
body:'The word "bazaar" comes directly from Persian (بازار). Persian bazaars are ancient commercial hubs — the Grand Bazaar of Tehran (بازار بزرگ تهران) covers 10km² and employs over 100,000 people. Shopping here is a social ritual: tea is offered, conversation flows, and bargaining is expected. Never accept the first price. The bazaar traditionally sat at the heart of the city next to the mosque — commerce and faith intertwined. Persian carpets (فرش) are among the world\'s greatest art forms, with knot counts exceeding 1,000 per square inch.'},
quiz:[
  {q:'این چند تومنه means:',c:'',opts:['What is this?','How much is this?','I want this','Too expensive'],a:1},
  {q:'تخفیف means:',c:'تخفیف',opts:['Price','Discount','Expensive','Change'],a:1},
  {q:'فقط نگاه می‌کنم means:',c:'',opts:['I\'ll buy it','How much?','Just looking','Very nice'],a:2},
  {q:'"Bazaar" is a word from:',c:'',opts:['Arabic','Turkish','Persian','French'],a:2},
  {q:'باشه means:',c:'باشه',opts:['No','Maybe','OK / alright','Never'],a:2},
]},

{id:'c5',type:'conv',num:'C5',title:'Family & Friends',fa:'خانواده و دوستان',
intro:'A2–B1 level. Talk about your family, describe relationships, and discuss friends. Family is central to Iranian culture — often multigenerational homes.',
phrases:[
  {fa:'خانواده‌ام بزرگه.',ro:'Khānevāde-am bozorge.',en:'My family is large.'},
  {fa:'چند تا برادر خواهر داری؟',ro:'Chand tā barādar khāhar dāri?',en:'How many siblings do you have?'},
  {fa:'یه برادر و دو خواهر دارم.',ro:'Ye barādar o do khāhar dāram.',en:'I have one brother and two sisters.'},
  {fa:'ازدواج کردی؟',ro:'Ezdevāj kardi?',en:'Are you married?'},
  {fa:'نه، هنوز مجردم.',ro:'Na, hanuz mojradam.',en:'No, I\'m still single.'},
  {fa:'دوست صمیمی‌ام رضاست.',ro:'Dust-e samimi-am Rezāst.',en:'My close friend is Reza.'},
  {fa:'با هم بزرگ شدیم.',ro:'Bā ham bozorg shodim.',en:'We grew up together.'},
],
family:[
  {fa:'پدر',ro:'pedar',en:'father'},{fa:'مادر',ro:'mādar',en:'mother'},{fa:'برادر',ro:'barādar',en:'brother'},
  {fa:'خواهر',ro:'khāhar',en:'sister'},{fa:'پسر',ro:'pesar',en:'son/boy'},{fa:'دختر',ro:'dokhtar',en:'daughter/girl'},
  {fa:'پدربزرگ',ro:'pedar-bozorg',en:'grandfather'},{fa:'مادربزرگ',ro:'mādar-bozorg',en:'grandmother'},
],
dialogue:{title:'Catching up with an old friend',
lines:[
  {who:'A',name:'شیرین Shirin',fa:'شیرین! چقدر وقته ندیدمت!',ro:'Shirin! Cheghadr vaghte nadidamat!',en:'Shirin! It\'s been so long since I saw you!'},
  {who:'B',name:'پریسا Parisa',fa:'پریسا جون! حالت چطوره؟ خانواده‌ات خوبن؟',ro:'Parisā jun! Hālat chetore? Khānevāde-at khuban?',en:'Parisa dear! How are you? Is your family well?'},
  {who:'A',name:'شیرین Shirin',fa:'همه خوبن، ممنون. بابام بازنشسته شد.',ro:'Hame khuban, mamnun. Bābām bāz-nashaste shod.',en:'Everyone is well, thank you. My dad just retired.'},
  {who:'B',name:'پریسا Parisa',fa:'آره؟ ماشاالله! و تو؟ هنوز مجردی؟',ro:'Āre? Māshāllāh! Va to? Hanuz mojradi?',en:'Really? Mashallah! And you? Still single?'},
  {who:'A',name:'شیرین Shirin',fa:'نه، نامزد کردم! ماه دیگه عروسیمه.',ro:'Na, nāmzad kardam! Māh-e dige arusimeh.',en:'No, I got engaged! My wedding is next month!'},
  {who:'B',name:'پریسا Parisa',fa:'مبارک باشه! خوشبخت بشید!',ro:'Mobārak bāshe! Khoshbakht beshid!',en:'Congratulations! May you be happy!'},
]},
culture:{icon:'👨‍👩‍👧',tag:'Family',title:'Family Values in Iranian Culture',
fa:'خانواده',ro:'Khānevāde',en:'"Family"',
body:'Family (خانواده) is the foundation of Iranian society. Multigenerational living is common — grandparents, parents, and children often under one roof. The concept of family honour (آبروی خانوادگی ābruy-e khānevādegi) carries great weight. Friday (جمعه, jome) is family day — the day off in Iran — when extended family gathers for a large lunch. Addressing elders respectfully (using plural "you" — شما shomā instead of تو to) is essential etiquette.'},
quiz:[
  {q:'مادر means:',c:'مادر',opts:['Father','Sister','Mother','Grandmother'],a:2},
  {q:'مبارک باشه means:',c:'',opts:['Good night','Welcome','Congratulations','Thank you'],a:2},
  {q:'مجرد means:',c:'مجرد',opts:['Married','Divorced','Single','Engaged'],a:2},
  {q:'Friday is significant in Iran because:',c:'',opts:['It\'s a market day','It\'s the day off and family day','It\'s a national holiday','It\'s a religious fast'],a:1},
  {q:'Using شما instead of تو shows:',c:'',opts:['Anger','Intimacy','Respect/formality','Confusion'],a:2},
]},

culture:{icon:'💼',tag:'Economy',title:'Iran\'s Young, Tech-Driven Workforce',

{id:'t1',type:'cult',num:'T1',title:'Persian History — Ancient Roots',fa:'تاریخ ایران',
intro:'Iran is one of the world\'s oldest continuous civilizations. From Cyrus the Great to the Safavid Empire, Persian history spans 3,000+ recorded years.',
timeline:[
  {year:'c. 550 BCE',title:'Achaemenid Empire — هخامنشیان',body:'Cyrus the Great (کوروش بزرگ) founded the first Persian Empire — the largest empire the world had seen. His Cyrus Cylinder is considered the world\'s first human rights declaration. The empire stretched from Greece to India.',fa:'کوروش بزرگ'},
  {year:'330 BCE',title:'Alexander\'s Conquest — اسکندر',body:'Alexander the Great conquered Persia and burned Persepolis (تخت جمشید). Yet Persian culture absorbed and transformed its conquerors — as it would do repeatedly throughout history.',fa:'تخت جمشید'},
  {year:'224–651 CE',title:'Sassanid Empire — ساسانیان',body:'The second great Persian empire. Zoroastrianism (زرتشت) was the state religion. Persian became a sophisticated literary language. The empire fell to the Arab Islamic conquest in 651 CE.',fa:'زرتشت'},
  {year:'9th–11th c.',title:'Islamic Golden Age — رنسانس ایرانی',body:'Persian scholars led the world in mathematics, astronomy, medicine, and philosophy. Ibn Sina (ابن سینا — Avicenna) wrote the Canon of Medicine, used in European universities for 600 years.',fa:'ابن سینا'},
  {year:'1501–1736',title:'Safavid Empire — صفویان',body:'Shah Ismail I established Shia Islam as the state religion. Isfahan (اصفهان) became one of the world\'s most beautiful cities. Persian art, architecture, and poetry reached their zenith.',fa:'اصفهان'},
  {year:'1979',title:'Islamic Revolution — انقلاب اسلامی',body:'The Shah was overthrown and the Islamic Republic was established under Ayatollah Khomeini. Iran remains the Islamic Republic today, though society is complex, diverse, and constantly evolving.',fa:'انقلاب'},
],
culture:{icon:'🏛️',tag:'Heritage',title:'Persepolis — تخت جمشید',
fa:'تخت جمشید، تخت شاهان جهان.',ro:'Takht-e Jamshid, takht-e shāhān-e jahān.',en:'"Persepolis, throne of the kings of the world."',
body:'Persepolis (تخت جمشید — "Throne of Jamshid") in Fars Province was the ceremonial capital of the Achaemenid Empire, built around 518 BCE. Its carved reliefs show delegations from 23 nations bringing tribute — a vision of a multicultural empire. Burned by Alexander in 330 BCE, its ruins survive and are a UNESCO World Heritage Site. Every Iranian knows Persepolis as a symbol of civilizational pride.'},
quiz:[
  {q:'Cyrus the Great founded:',c:'',opts:['The Sassanid Empire','The Achaemenid Empire','The Safavid Empire','The Parthian Empire'],a:1},
  {q:'تخت جمشید is:',c:'تخت جمشید',opts:['A city in Tehran','Persepolis — ancient ceremonial capital','A famous mosque','A mountain peak'],a:1},
  {q:'The Safavid Empire established which religion as state religion?',c:'',opts:['Sunni Islam','Zoroastrianism','Shia Islam','Christianity'],a:2},
  {q:'Ibn Sina (Avicenna) was famous for:',c:'',opts:['Poetry','Mathematics only','Medicine and philosophy','Architecture'],a:2},
  {q:'The Islamic Revolution in Iran was in:',c:'',opts:['1953','1963','1979','1989'],a:2},
]},

{id:'t2',type:'cult',num:'T2',title:'Famous Cities — Tehran & Isfahan',fa:'تهران و اصفهان',

  {name:'Isfahan',fa:'اصفهان',desc:'"Isfahan is half the world" (اصفهان نصف جهان). The Safavid capital features the world\'s most beautiful central square — Naqsh-e Jahan, UNESCO-listed.',sights:'Naqsh-e Jahan Square · Sheikh Lotfallah Mosque · Khaju Bridge · Vank Cathedral · Si-o-Se Pol bridge'},
],

culture:{icon:'🕌',tag:'Architecture',title:'Naqsh-e Jahan Square — نقش جهان',
fa:'اصفهان نصف جهان است.',ro:'Esfahān nesf-e jahān ast.',en:'"Isfahan is half the world."',
body:'Naqsh-e Jahan ("Image of the World") Square in Isfahan was built by Shah Abbas I around 1602. At 512m × 163m, it is one of the largest public squares on Earth, surrounded by the Imam Mosque, Sheikh Lotfallah Mosque, Ali Qapu Palace, and the Grand Bazaar. The tilework uses a mathematical mosaic system predating Western computer graphics. Polo was played here — the goalposts still stand. UNESCO declared it a World Heritage Site in 1979.'},
quiz:[

  {q:'Which sport was historically played at Naqsh-e Jahan?',c:'',opts:['Wrestling','Archery','Polo','Football'],a:2},
]},

{id:'t3',type:'cult',num:'T3',title:'Famous Cities — Shiraz & Persepolis',fa:'شیراز و تخت جمشید',
intro:'Shiraz is the city of poets, wine, roses, and gardens. Nearby lies Persepolis — the greatest surviving monument of ancient Persia.',
cities:[
  {name:'Shiraz',fa:'شیراز',desc:'City of Hafez and Saadi — Iran\'s two greatest lyric poets. Famous for its roses, gardens, and historically for wine (شراز wine takes its name from Shiraz). Warm, laid-back, beautiful.',sights:'Tomb of Hafez · Tomb of Saadi · Nasir-ol-Molk (Pink) Mosque · Eram Garden · Vakil Bazaar'},
  {name:'Persepolis',fa:'تخت جمشید',desc:'50km northeast of Shiraz. The Achaemenid ceremonial capital. Giant carved columns, bas-reliefs of subject nations, the Gate of All Nations. Built 518 BCE, burned 330 BCE.',sights:'Gate of All Nations · Apadana Palace · Hall of 100 Columns · Treasury · Royal Tombs at Naqsh-e Rostam'},
],

  {fa:'مقبره حافظ کجاست؟',ro:'Maqbare-ye Hāfez kojāst?',en:'Where is the tomb of Hafez?'},
  {fa:'چقدر باشکوهه!',ro:'Cheghadr bāshokohe!',en:'How magnificent it is!'},
  {fa:'عکس بگیریم؟',ro:'Aks begirim?',en:'Shall we take a photo?'},
  {fa:'تاریخ ایران خیلی غنیه.',ro:'Tārikh-e Irān kheyly ghanihe.',en:'Iranian history is very rich.'},
],
culture:{icon:'📖',tag:'Poetry',title:'Hafez — The Tongue of the Unseen',
fa:'الا یا ایها الساقی ادر کأساً و ناولها.',ro:'Alā yā ayyohā as-sāqi adir ka\'san wa nāwilhā.',en:'"Come, O Cupbearer, pass the cup around..."',
body:'Hafez (حافظ, 1315–1390) of Shiraz is considered Iran\'s greatest lyric poet. His Divan (دیوان) of ghazals (love poems) is found in virtually every Iranian home — used for فال حافظ (fāl-e Hāfez): opening randomly for spiritual guidance, like a sacred oracle. His tomb (آرامگاه حافظ) in Shiraz\'s Hafezieh garden is one of Iran\'s most visited sites. Millions come to read a ghazal and find meaning in its lines.'},
quiz:[
  {q:'Hafez was from:',c:'',opts:['Tehran','Isfahan','Shiraz','Tabriz'],a:2},
  {q:'فال حافظ is:',c:'',opts:['A food dish','Opening the Divan for guidance','A music tradition','A dance'],a:1},
  {q:'Persepolis was built approximately:',c:'',opts:['100 BCE','518 BCE','200 CE','1000 CE'],a:1},
  {q:'چقدر باشکوهه means:',c:'',opts:['How old is it?','How far is it?','How magnificent!','How expensive!'],a:2},
  {q:'The "Pink Mosque" is in:',c:'',opts:['Tehran','Isfahan','Shiraz','Tabriz'],a:2},
]},

{id:'t4',type:'cult',num:'T4',title:'Weather & Seasons in Iran',fa:'آب و هوای ایران',
intro:'Iran is a vast country with dramatically different climates — from ski slopes north of Tehran in winter to beach resorts on the Persian Gulf.',
seasons:[
  {icon:'🌸',s:'Spring — بهار',r:'bahār',temp:'10–25°C',desc:'Best travel season. Nowruz (New Year) in March. Gardens bloom, waterfalls flow, the whole country travels.'},
  {icon:'☀️',s:'Summer — تابستان',r:'tābestan',temp:'25–45°C',desc:'Very hot in most cities. Iranians escape to the Caspian coast or mountain villages. The north stays pleasant.'},
  {icon:'🍂',s:'Autumn — پاییز',r:'pāyiz',temp:'8–22°C',desc:'Beautiful, mild. Pomegranates ripen. Second-best travel season — fewer crowds than spring.'},
  {icon:'❄️',s:'Winter — زمستان',r:'zemestān',temp:'-5 to 15°C',desc:'Ski season! Dizin and Shemshak (near Tehran) have world-class slopes. Deserts stay mild and perfect for visiting.'},

let curLesson = 0;
let curTab = 'learn';
let qz = {q:0,score:0,answered:false,done:false};

function getTagHTML(type){
  if(type==='alpha') return '<span class="tag tag-alpha">Alphabet</span>';
  if(type==='conv') return '<span class="tag tag-conv">Conversation</span>';
  if(type==='cult') return '<span class="tag tag-cult">Travel & Culture</span>';
  if(type==='hist') return '<span class="tag tag-hist">History</span>';
  return '';
}

function buildSidebar(){
  const groups = {alpha:'Alphabet Lessons',conv:'Conversational Lessons',cult:'Travel, Culture & History'};
  const byType = {alpha:[],conv:[],cult:[]};
  LESSONS.forEach((l,i)=>{const t=l.type==='hist'?'cult':l.type; byType[t].push({l,i})});
  let html='';
  Object.keys(groups).forEach(type=>{
    if(!byType[type].length) return;
    html+=`<div class="section-group"><div class="section-group-label">${groups[type]}</div>`;
    byType[type].forEach(({l,i})=>{
      html+=`<div class="lesson-link ${i===curLesson?'active':''}" id="link-${i}" onclick="go(${i})">
        <div class="num">${l.num}</div>
        <span style="flex:1">${l.title}</span>
        ${getTagHTML(l.type)}
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('sidebarContent').innerHTML=html;
}

function go(i){
  curLesson=i;
  qz={q:0,score:0,answered:false,done:false};
  buildSidebar();
  const l=LESSONS[i];
  document.getElementById('topbarTitle').textContent=l.title;
  document.getElementById('topbarBadge').innerHTML=getTagHTML(l.type);
  document.getElementById('topbarBadge').className='topbar-badge';
  switchTab(curTab);
}

function switchTab(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  document.querySelectorAll('.section').forEach(el=>el.classList.toggle('active',el.id==='sec-'+t));
  if(t==='learn') renderLearn();
  if(t==='vocab') renderVocab();
  if(t==='culture') renderCulture();
  if(t==='quiz') renderQuiz();
}

function renderLearn(){

    h+=`</table></div>
    <div class="vowel-box"><strong>Short vowels (حرکت):</strong> Usually omitted in everyday text, but shown in learning materials:
    <br><strong>َ</strong> = "a" (above) · <strong>ِ</strong> = "e" (below) · <strong>ُ</strong> = "o" (above) · Example: <span style="font-size:18px;color:var(--accent2)">پِدَر</span> (pedar = father)</div>`;

function renderQuiz(){
  const l=LESSONS[curLesson];
  const qs=l.quiz;
  if(!qs||!qs.length){
    document.getElementById('sec-quiz').innerHTML=`<div style="color:var(--text3);padding:2rem 0;font-size:14px">No quiz for this lesson yet.</div>`;
    return;
  }
  if(qz.done){
    const pct=Math.round((qz.score/qs.length)*100);
    const msg=pct>=80?'آفرین! (Āfarin!) Excellent work. Ready for the next lesson!'
      :pct>=60?'خوب! (Khub!) Good effort. Review what you missed and try again.'
      :'ادامه بده! (Edāme bede!) Keep going! Practice makes perfect.';
    document.getElementById('sec-quiz').innerHTML=`<div class="score-board">
      <div class="sc-big">${qz.score}/${qs.length}</div>
      <div class="sc-label">${pct}%</div>
      <div style="font-size:36px;margin:1rem 0">${pct>=80?'🌟':pct>=60?'👍':'📖'}</div>
      <div class="sc-msg">${msg}</div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-sec" onclick="resetQuiz()">Try Again</button>
        ${curLesson<LESSONS.length-1?`<button class="btn btn-acc" onclick="go(${curLesson+1})">Next Lesson →</button>`:''}
      </div>
    </div>`;
    return;
  }
  const q=qs[qz.q];
  const dots=qs.map((_,i)=>`<div class="qp-dot ${i<qz.q?'done':i===qz.q?'cur':''}"></div>`).join('');
  let h=`<div class="quiz-progress">${dots}</div>
  <div class="quiz-card">
    <div class="q-label">Question ${qz.q+1} of ${qs.length}</div>
    <div class="q-text">${q.q}</div>
    ${q.c?`<div class="q-char">${q.c}</div>`:''}
    <div class="q-opts">
      ${q.opts.map((o,i)=>`<button class="q-opt" id="qo${i}" onclick="answerQ(${i})">${o}</button>`).join('')}
    </div>
    <div class="q-feedback" id="qfb"></div>
  </div>
  <div class="q-next"><button class="btn btn-acc" id="qnext" onclick="nextQ()" style="display:none">Next →</button></div>`;
  document.getElementById('sec-quiz').innerHTML=h;
}

function answerQ(chosen){
  if(qz.answered)return;
  qz.answered=true;
  const q=LESSONS[curLesson].quiz[qz.q];
  const ok=q.a===chosen;
  if(ok)qz.score++;
  document.querySelectorAll('.q-opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.a)b.classList.add('ok');
    else if(i===chosen&&!ok)b.classList.add('no');
  });
  const fb=document.getElementById('qfb');
  fb.className='q-feedback show '+(ok?'ok':'no');
  fb.textContent=ok?'✓ Correct! آفرین!':'✗ Correct answer: "'+q.opts[q.a]+'"';
  document.getElementById('qnext').style.display='inline-block';
}

function nextQ(){
  qz.q++;
  qz.answered=false;
  if(qz.q>=LESSONS[curLesson].quiz.length)qz.done=true;
  renderQuiz();
}

function resetQuiz(){
  qz={q:0,score:0,answered:false,done:false};
  renderQuiz();
}

function filterLessons(val){
  const v=val.toLowerCase();
  document.querySelectorAll('.lesson-link').forEach((el,i)=>{
    const l=LESSONS[i];
    const match=!v||l.title.toLowerCase().includes(v)||l.fa.includes(v)||(l.num+'').toLowerCase().includes(v);
    el.style.display=match?'flex':'none';
  });
}

// Init
go(0);
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
</script>
